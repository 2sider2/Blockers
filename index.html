<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blockers</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background: #f0f0f0;
            font-family: 'Press Start 2P', system-ui;
            color: #222;
            text-align: center;
            overflow: hidden;
        }
        
        #lobby {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 40px 60px;
            border: 8px solid #222;
            box-shadow: 0 0 0 8px #ffcc00;
            max-width: 520px;
            width: 90%;
        }
        
        h1 { font-size: 48px; margin: 0 0 30px 0; color: #ff0000; text-shadow: 4px 4px 0 #222; }
        
        button {
            background: #ff0000; color: white; border: 6px solid #222;
            padding: 15px 30px; font-family: 'Press Start 2P'; font-size: 18px;
            cursor: pointer; margin: 10px; box-shadow: 4px 4px 0 #222;
            transition: all 0.1s;
        }
        button:hover { background: #ff4444; transform: translate(-2px,-2px); box-shadow: 6px 6px 0 #222; }
        button:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 #222; }
        
        input, select {
            font-family: 'Press Start 2P'; font-size: 18px; padding: 15px;
            width: 200px; text-align: center; border: 6px solid #222; margin: 20px 0;
        }
        
        #roomInfo, #playerList { margin-top: 20px; font-size: 18px; min-height: 80px; line-height: 1.6; }
        
        #gameContainer {
            display: none; flex-direction: column; align-items: center;
            height: 100vh; background: #fff;
        }
        
        canvas {
            border: 8px solid #222;
            box-shadow: 0 0 0 8px #ffcc00;
            image-rendering: pixelated;
            background: #ffffff;
        }
        
        #hud {
            position: absolute; top: 20px; left: 20px;
            background: white; padding: 10px 20px; border: 6px solid #222;
            font-size: 14px; text-align: left; box-shadow: 4px 4px 0 #222;
            line-height: 1.5;
        }
        
        #instructions {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: white; padding: 10px 20px; border: 6px solid #222;
            font-size: 12px; box-shadow: 4px 4px 0 #222;
        }
        
        .status { color: #00cc00; font-size: 14px; }
        .player-entry { font-size: 13px; margin: 2px 0; }
    </style>
</head>
<body>
    <!-- LOBBY -->
    <div id="lobby">
        <h1>BLOCKERS</h1>
        <p style="margin:20px 0 30px;font-size:16px;">4-Player Cube Physics Arena</p>
        
        <button onclick="createRoom()">CREATE ROOM</button>
        
        <div style="margin:15px 0;">
            <strong>MAX PLAYERS:</strong><br>
            <select id="maxPlayers" style="width:auto;padding:8px 15px;font-size:16px;">
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4" selected>4 (recommended)</option>
            </select>
        </div>

        <div style="margin:30px 0;">
            <input type="text" id="joinCode" placeholder="CODE" maxlength="4">
            <br>
            <button onclick="joinRoom()">JOIN ROOM</button>
        </div>
        
        <div id="roomInfo"></div>
        <div id="playerList"></div>
    </div>

    <!-- GAME -->
    <div id="gameContainer">
        <canvas id="canvas" width="800" height="500"></canvas>
        
        <div id="hud">
            ROOM CODE: <span id="displayCode" style="color:#ff0000;font-weight:bold;"></span><br>
            YOU: <span id="playerColor" style="font-weight:bold;">BLUE</span><br>
            <span id="connectionStatus" class="status">WAITING FOR PLAYERS...</span><br>
            <div id="hudPlayers" style="margin-top:8px;font-size:12px;"></div>
        </div>
        
        <div id="instructions">
            ← → MOVE &nbsp;&nbsp;&nbsp; SPACE JUMP<br>
            (Real physics — push everyone!)
        </div>
    </div>

    <script>
        // =============== GLOBALS ===============
        let currentRoomCode = "";
        let isHost = false;
        let peer = null;
        let connections = [];           // only host uses this
        let players = {};               // peerId → player object
        let localPlayerId = "local";
        let myColor = "";
        let maxPlayers = 4;
        let gameStarted = false;
        let canvas, ctx, groundY;
        let keys = {};
        let gravity = 0.6;
        let friction = 0.85;
        
        const CUBE_SIZE = 80;
        const GROUND_HEIGHT = 80;
        const COLORS = ["#81D4FA", "#FF5252", "#66BB6A", "#FFCA28"]; // Blue, Red, Green, Yellow
        const SPAWN_X = [120, 280, 440, 600];

        // =============== LOBBY ===============
        function generateCode() {
            return Math.floor(1000 + Math.random() * 9000).toString();
        }

        function createRoom() {
            currentRoomCode = generateCode();
            isHost = true;
            maxPlayers = parseInt(document.getElementById("maxPlayers").value) || 4;
            
            peer = new Peer(`blockers-${currentRoomCode}`);
            
            peer.on('open', () => {
                document.getElementById("roomInfo").innerHTML = `
                    <strong>ROOM CREATED!</strong><br>
                    CODE: <span style="color:#ff0000;font-size:24px;">${currentRoomCode}</span><br>
                    MAX: ${maxPlayers} players<br><br>
                    <button onclick="enterWorld()">ENTER YOUR WORLD</button>
                `;
                updatePlayerList();
            });

            peer.on('connection', (conn) => {
                if (Object.keys(players).length >= maxPlayers) {
                    conn.close();
                    return;
                }
                connections.push(conn);
                setupNewConnection(conn);
            });
        }

        function joinRoom() {
            const input = document.getElementById("joinCode").value.trim().toUpperCase();
            if (input.length !== 4 || isNaN(input)) {
                document.getElementById("roomInfo").innerHTML = `<span style="color:red;">Invalid code!</span>`;
                return;
            }
            currentRoomCode = input;
            isHost = false;
            
            peer = new Peer();
            peer.on('open', () => {
                const conn = peer.connect(`blockers-${currentRoomCode}`);
                connections = [conn]; // joiners only have 1 connection
                setupNewConnection(conn);
                
                document.getElementById("roomInfo").innerHTML = `
                    <strong>CONNECTING...</strong><br>
                    CODE: <span style="color:#ff0000;font-size:24px;">${currentRoomCode}</span><br><br>
                    <button onclick="enterWorld()">ENTER WORLD</button>
                `;
            });
        }

        function setupNewConnection(conn) {
            conn.on('open', () => {
                if (isHost) {
                    // Host assigns ID & color
                    const newId = conn.peer;
                    const index = Object.keys(players).length;
                    const newPlayer = {
                        id: newId,
                        x: SPAWN_X[index],
                        y: groundY ? groundY - CUBE_SIZE : 300,
                        vx: 0, vy: 0,
                        color: COLORS[index],
                        onGround: true
                    };
                    players[newId] = newPlayer;
                    broadcastFullState();
                }
            });

            conn.on('data', (data) => {
                if (isHost) {
                    // Host receives move from a client
                    if (players[data.id]) {
                        players[data.id].x = data.x;
                        players[data.id].y = data.y;
                        players[data.id].vx = data.vx;
                        players[data.id].vy = data.vy;
                    }
                    broadcastFullState();
                } else {
                    // Joiner receives full state from host
                    if (data.type === "fullState") {
                        Object.keys(data.players).forEach(id => {
                            if (id !== localPlayerId) {
                                if (!players[id]) players[id] = { ...data.players[id] };
                                else {
                                    players[id].x = data.players[id].x;
                                    players[id].y = data.players[id].y;
                                    players[id].vx = data.players[id].vx;
                                    players[id].vy = data.players[id].vy;
                                }
                            }
                        });
                    }
                }
            });

            conn.on('close', () => {
                if (isHost) {
                    // Remove disconnected player
                    const id = Object.keys(players).find(k => players[k].id === conn.peer);
                    if (id) delete players[id];
                    connections = connections.filter(c => c !== conn);
                    broadcastFullState();
                } else {
                    alert("Host disconnected! Refresh to play again.");
                }
            });
        }

        function broadcastFullState() {
            const state = { type: "fullState", players: players };
            connections.forEach(c => {
                if (c.open) c.send(state);
            });
        }

        function updatePlayerList() {
            let html = `<strong>PLAYERS IN ROOM:</strong><br>`;
            Object.values(players).forEach((p, i) => {
                html += `<span class="player-entry" style="color:${p.color}">■ ${["HOST","P2","P3","P4"][i]}</span><br>`;
            });
            document.getElementById("playerList").innerHTML = html;
        }

        // =============== GAME ===============
        function enterWorld() {
            document.getElementById("lobby").style.display = "none";
            document.getElementById("gameContainer").style.display = "flex";
            document.getElementById("displayCode").textContent = currentRoomCode;

            canvas = document.getElementById("canvas");
            ctx = canvas.getContext("2d");
            groundY = canvas.height - GROUND_HEIGHT;

            // Initialize local player
            const myIndex = isHost ? 0 : Object.keys(players).length; // host is always 0
            myColor = COLORS[myIndex];
            
            players[localPlayerId] = {
                id: localPlayerId,
                x: SPAWN_X[myIndex],
                y: groundY - CUBE_SIZE,
                vx: 0, vy: 0,
                color: myColor,
                onGround: true
            };

            document.getElementById("playerColor").innerHTML = 
                `<span style="color:${myColor}">■ ${isHost ? "BLUE (HOST)" : "YOU"}</span>`;
            
            // Keyboard
            window.addEventListener("keydown", e => {
                keys[e.key] = true;
                if (e.key === " " && players[localPlayerId].onGround) {
                    players[localPlayerId].vy = -15;
                    players[localPlayerId].onGround = false;
                }
            });
            window.addEventListener("keyup", e => keys[e.key] = false);

            gameStarted = true;
            requestAnimationFrame(gameLoop);
            
            if (isHost) broadcastFullState();
        }

        function updatePhysics(entity) {
            entity.vy += gravity;
            
            if (entity.id === localPlayerId) {
                if (keys["ArrowLeft"] || keys["a"] || keys["A"]) entity.vx = -6;
                else if (keys["ArrowRight"] || keys["d"] || keys["D"]) entity.vx = 6;
                else entity.vx *= friction;
            }
            
            entity.x += entity.vx;
            entity.y += entity.vy;
            
            if (entity.y >= groundY - entity.height) {
                entity.y = groundY - entity.height;
                entity.vy = 0;
                entity.onGround = true;
            }
            
            if (entity.x < 0) { entity.x = 0; entity.vx = 0; }
            if (entity.x > canvas.width - entity.width) {
                entity.x = canvas.width - entity.width;
                entity.vx = 0;
            }
        }

        function checkCollision(a, b) {
            return !(a.x + a.width < b.x || b.x + b.width < a.x ||
                     a.y + a.height < b.y || b.y + b.height < a.y);
        }

        function resolveCollision(a, b) {
            const overlapX = (a.width + b.width) / 2 - Math.abs((a.x + a.width/2) - (b.x + b.width/2));
            const overlapY = (a.height + b.height) / 2 - Math.abs((a.y + a.height/2) - (b.y + b.height/2));
            
            if (overlapX > overlapY) {
                if (a.x + a.width/2 < b.x + b.width/2) {
                    a.x -= overlapX / 2; b.x += overlapX / 2;
                } else {
                    a.x += overlapX / 2; b.x -= overlapX / 2;
                }
            } else {
                if (a.y + a.height/2 < b.y + b.height/2) a.y -= overlapY / 2;
                else a.y += overlapY / 2;
            }
        }

        function drawCube(entity) {
            ctx.fillStyle = entity.color;
            ctx.fillRect(entity.x, entity.y, entity.width || CUBE_SIZE, entity.height || CUBE_SIZE);
            
            ctx.fillStyle = "#111111";
            ctx.fillRect(entity.x + 28, entity.y + 44, 24, 28);
            
            ctx.strokeStyle = "#222222";
            ctx.lineWidth = 6;
            ctx.strokeRect(entity.x + 3, entity.y + 3, CUBE_SIZE - 6, CUBE_SIZE - 6);
            
            ctx.fillStyle = "rgba(255,255,255,0.4)";
            ctx.fillRect(entity.x + 8, entity.y + 8, 15, 15);
        }

        function drawGround() {
            ctx.fillStyle = "#7CFC00";
            ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
            ctx.strokeStyle = "#5CB300";
            ctx.lineWidth = 4;
            for (let x = 20; x < canvas.width; x += 40) {
                ctx.beginPath();
                ctx.moveTo(x, groundY);
                ctx.lineTo(x + 10, groundY - 15);
                ctx.stroke();
            }
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#F0F8FF";
            ctx.fillRect(0, 0, canvas.width, groundY);
            
            // Update local player
            const local = players[localPlayerId];
            updatePhysics(local);
            
            // Collision with every other player
            Object.keys(players).forEach(id => {
                if (id !== localPlayerId) {
                    const other = players[id];
                    if (checkCollision(local, other)) {
                        resolveCollision(local, other);
                    }
                }
            });
            
            // Send my position
            if (connections.length > 0 && connections[0].open) {
                const payload = isHost 
                    ? { id: localPlayerId, x: local.x, y: local.y, vx: local.vx, vy: local.vy }
                    : { id: localPlayerId, x: local.x, y: local.y, vx: local.vx, vy: local.vy };
                connections[0].send(payload);
            }
            
            // Draw all players
            drawGround();
            Object.values(players).forEach(p => drawCube(p));
            
            ctx.fillStyle = "#222";
            ctx.font = "bold 18px 'Press Start 2P'";
            ctx.fillText("BLOCKERS", 30, 45);
            
            // Update HUD player list
            let hudHTML = "";
            Object.values(players).forEach(p => {
                hudHTML += `<span style="color:${p.color}">■</span> `;
            });
            document.getElementById("hudPlayers").innerHTML = hudHTML;
            
            requestAnimationFrame(gameLoop);
        }

        console.log("%c✅ BLOCKERS 4-PLAYER EDITION READY! Host-relay model, real pushing physics, 4 colors. Upload to GitHub Pages and play with up to 3 friends!", "color:#ff0000;font-family:monospace;font-size:14px");
    </script>
</body>
</html>
